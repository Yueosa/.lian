# 使用主题管理器 kitty-theme 选择的主题
# BEGIN_KITTY_THEME
# Ayaka
include current-theme.conf
# END_KITTY_THEME

# --- 字体: Fira Code ---
font_family      Fira Code
bold_font        Fira Code
italic_font      Fira Code Italic
bold_italic_font Fira Code Bold Italic
font_size        10.0

# 开启代码连字
disable_ligatures never

# Emoji fallback (彩色 emoji)
emoji_font       Noto Color Emoji

# --- 光标 ---
# 形状：块状 (block)
cursor_shape    block

# 光标粗细
cursor_beam_thickness 1.5
cursor_underline_thickness 2.0

# 拖尾动画 (kitty v0.29+)
cursor_trail 3
cursor_trail_decay 0.1 0.4
cursor_trail_start_threshold 2

# --- 窗口 ---
window_padding_width 12

# 背景透明
background_opacity   0.9
dynamic_background_opacity yes

# 防止 shell 与 kitty 光标冲突
shell_integration   enabled np-cursor

# delete键修复
map delete send_text all \x1b[3~

# --- 高刷同步 (165Hz / 180Hz 屏) ---
sync_to_monitor yes
repaint_delay   8
input_delay     2

# --- Splits 分屏 ---
# splits = 主布局（自由二叉切分）；stack = 备用布局（最大化当前 split）
enabled_layouts splits,stack

# 创建 split（继承当前目录）
# 命名按"分割线方向"理解：hsplit=横线=上下排列；vsplit=竖线=左右排列
map ctrl+shift+enter launch --location=hsplit --cwd=current
map ctrl+shift+\     launch --location=vsplit --cwd=current

# 焦点移动
map ctrl+shift+left  neighboring_window left
map ctrl+shift+down  neighboring_window down
map ctrl+shift+up    neighboring_window up
map ctrl+shift+right neighboring_window right

# 调整大小 (Ctrl+Alt+方向)
map ctrl+alt+left  resize_window wider
map ctrl+alt+right resize_window narrower
map ctrl+alt+up    resize_window taller
map ctrl+alt+down  resize_window shorter
map ctrl+alt+r     reset_window_sizes

# 切换布局：splits ↔ stack（最大化当前 split）
map ctrl+shift+z next_layout

# 关闭当前 split
map ctrl+shift+w close_window
